<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vendredi 13 - Une surprise vous attend...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Fond étoilé subtil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(212, 175, 55, 0.4), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(212, 175, 55, 0.3), transparent),
                radial-gradient(1px 1px at 50% 10%, rgba(212, 175, 55, 0.5), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(212, 175, 55, 0.3), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(212, 175, 55, 0.4), transparent),
                radial-gradient(1px 1px at 20% 90%, rgba(212, 175, 55, 0.2), transparent),
                radial-gradient(1px 1px at 80% 15%, rgba(212, 175, 55, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 45% 45%, rgba(212, 175, 55, 0.6), transparent),
                radial-gradient(1px 1px at 65% 70%, rgba(212, 175, 55, 0.2), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
            max-width: 420px;
            width: 100%;
        }

        .clover {
            font-size: 48px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            color: rgba(212, 175, 55, 0.6);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .scratch-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 24px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 0 0 2px rgba(212, 175, 55, 0.3),
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(212, 175, 55, 0.1);
        }

        .message-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            background: linear-gradient(135deg, #1a1520 0%, #0d0b12 100%);
            padding: 0;
        }

        .message-layer .photo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .message-layer .msg-overlay {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 16px 20px 18px;
            background: linear-gradient(to top, rgba(10, 8, 15, 0.92) 0%, rgba(10, 8, 15, 0.7) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .message-layer .heart {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .message-layer .msg-main {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 8px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.6);
        }

        .message-layer .msg-names {
            color: rgba(212, 175, 55, 0.8);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        #scratchCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            cursor: grab;
            touch-action: none;
            border-radius: 16px;
        }

        .hint {
            color: rgba(212, 175, 55, 0.5);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
            transition: opacity 0.5s;
        }

        .hint.hidden {
            opacity: 0;
        }

        /* Confettis */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
        }

        /* Apparition après révélation */
        .revealed .title {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            to { text-shadow: 0 0 40px rgba(212, 175, 55, 0.6), 0 0 80px rgba(212, 175, 55, 0.2); }
        }

        @media (max-width: 360px) {
            .scratch-wrapper {
                width: 280px;
                height: 280px;
            }
            .title { font-size: 22px; }
            .message-layer .msg-main { font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="clover">&#127808;</div>
        <h1 class="title">Vendredi 13</h1>
        <p class="subtitle">C'est votre jour de chance</p>

        <div class="scratch-wrapper">
            <div class="message-layer">
                <img class="photo" src="IMG_20260313_101328.jpg" alt="Lulu et Alex" onerror="this.style.display='none'">
                <div class="msg-overlay">
                    <div class="heart">&#10084;&#65039;</div>
                    <div class="msg-main">Aujourd'hui, c'est jour de chance !<br>On s'est pacs&eacute;s &agrave; Pamiers</div>
                    <div class="msg-names">&#8212; Lulu &amp; Alex &#8212;</div>
                </div>
            </div>
            <canvas id="scratchCanvas"></canvas>
        </div>

        <p class="hint" id="hint">Grattez pour d&eacute;couvrir...</p>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = canvas.parentElement;
        let isDrawing = false;
        let revealed = false;

        function initCanvas() {
            const rect = wrapper.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);

            // Fond doré avec texture
            const gradient = ctx.createLinearGradient(0, 0, rect.width, rect.height);
            gradient.addColorStop(0, '#c9a84c');
            gradient.addColorStop(0.3, '#d4af37');
            gradient.addColorStop(0.5, '#e8c84a');
            gradient.addColorStop(0.7, '#d4af37');
            gradient.addColorStop(1, '#b8962e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, rect.width, rect.height);

            // Texture grains
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * rect.width;
                const y = Math.random() * rect.height;
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.08})`;
                ctx.fillRect(x, y, 1, 1);
            }

            // Motifs trèfle en filigrane
            ctx.font = '28px serif';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
            for (let x = 20; x < rect.width; x += 60) {
                for (let y = 30; y < rect.height; y += 55) {
                    ctx.fillText('\u{1F340}', x + (y % 110 === 30 ? 0 : 30), y);
                }
            }

            // Texte central
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 18px "Playfair Display", serif';
            ctx.fillStyle = 'rgba(90, 70, 20, 0.7)';
            ctx.fillText('Grattez ici !', rect.width / 2, rect.height / 2);

            ctx.globalCompositeOperation = 'destination-out';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(pos) {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 22, 0, Math.PI * 2);
            ctx.fill();
            checkReveal();
        }

        function checkReveal() {
            if (revealed) return;
            const rect = wrapper.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const imageData = ctx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
            const pixels = imageData.data;
            let transparent = 0;
            const total = pixels.length / 4;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) transparent++;
            }

            if (transparent / total > 0.45) {
                revealAll();
            }
        }

        function revealAll() {
            revealed = true;
            canvas.style.transition = 'opacity 0.8s ease';
            canvas.style.opacity = '0';
            document.getElementById('hint').classList.add('hidden');
            document.getElementById('container').classList.add('revealed');

            setTimeout(() => {
                canvas.style.display = 'none';
                launchConfetti();
            }, 800);
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#d4af37', '#e8c84a', '#fff', '#c9a84c', '#ff6b8a', '#b8962e', '#ffd700'];

            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const delay = Math.random() * 0.5;
                const duration = 2 + Math.random() * 2;
                const size = 6 + Math.random() * 8;
                const rotation = Math.random() * 360;
                const shape = Math.random() > 0.5 ? '50%' : '0';

                confetti.style.cssText = `
                    left: ${left}%;
                    top: -10px;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    border-radius: ${shape};
                    animation: fall ${duration}s ease-in ${delay}s forwards;
                    transform: rotate(${rotation}deg);
                `;
                container.appendChild(confetti);
            }

            // Ajouter keyframes dynamiquement
            if (!document.getElementById('confetti-style')) {
                const style = document.createElement('style');
                style.id = 'confetti-style';
                style.textContent = `
                    @keyframes fall {
                        0% { opacity: 1; top: -10px; transform: rotate(0deg) translateX(0); }
                        100% { opacity: 0; top: 110vh; transform: rotate(720deg) translateX(${Math.random() > 0.5 ? '' : '-'}80px); }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // Events souris
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            scratch(getPos(e));
        });
        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) scratch(getPos(e));
        });
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        // Events tactile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            scratch(getPos(e));
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing) scratch(getPos(e));
        }, { passive: false });
        canvas.addEventListener('touchend', () => isDrawing = false);

        // Init
        initCanvas();
        window.addEventListener('resize', () => {
            if (!revealed) {
                ctx.globalCompositeOperation = 'source-over';
                initCanvas();
            }
        });
    </script>
</body>
</html>
